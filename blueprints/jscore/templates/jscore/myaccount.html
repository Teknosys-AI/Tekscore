{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">
    <div class="row justify-content-center">
        <!-- Sidebar with links -->
        <div class="col-md-3">
            <div class="card">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active" style="background-color: lightgray; border-color: lightgray; color: black;">Profile</a>
                    <a href="#" class="list-group-item list-group-item-action">Privacy & Safety</a>
                    <a href="#" class="list-group-item list-group-item-action">Integrations</a>
                    <a href="#" class="list-group-item list-group-item-action">Notifications</a>
                    <a href="#" class="list-group-item list-group-item-action">Advanced</a>
                </div>
            </div>
        </div>

        <!-- Profile form -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title" >Profile</h4>

                    <!-- Username field -->
                    <div class="form-group row">
                        <label for="username" class="col-sm-3 col-form-label">Username</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="username" value="Moqups" readonly>
                        </div>
                    </div>

                    <!-- Email field -->
                    <div class="form-group row">
                        <label for="email" class="col-sm-3 col-form-label">Email Address</label>
                        <div class="col-sm-9">
                            <input type="email" class="form-control" id="email" value="contact@moqups.com" readonly>
                        </div>
                    </div>

                    <!-- Role field -->
                    <div class="form-group row">
                        <label for="role" class="col-sm-3 col-form-label">Role</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="role" value="Product Manager" readonly>
                        </div>
                    </div>

                    <!-- Change password button -->
                    <div class="form-group row">
                        <div class="col-sm-12">
                            <button class="btn btn-dark btn-block">UPDATE</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
